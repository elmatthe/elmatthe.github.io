<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio Dashboard workflow overview</title>
  <desc id="desc">Three-step flow: Import Trades to Track &amp; Analyze to Generate Reports.</desc>
  <rect width="1200" height="260" fill="#F5F8FC"/>

  <rect x="40" y="44" width="320" height="172" rx="14" fill="#1A2E4A"/>
  <text x="200" y="94" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="28" font-weight="700">Import Trades</text>
  <text x="200" y="132" text-anchor="middle" fill="#D7E4FB" font-family="Arial, sans-serif" font-size="20">CSV / TSV / XLSX / PDF</text>
  <text x="200" y="158" text-anchor="middle" fill="#D7E4FB" font-family="Arial, sans-serif" font-size="20">11 brokers auto-detected</text>
  <text x="200" y="184" text-anchor="middle" fill="#D7E4FB" font-family="Arial, sans-serif" font-size="20">SHA-256 deduplication</text>

  <rect x="440" y="44" width="320" height="172" rx="14" fill="#1A2E4A"/>
  <text x="600" y="94" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="28" font-weight="700">Track &amp; Analyze</text>
  <text x="600" y="132" text-anchor="middle" fill="#D7E4FB" font-family="Arial, sans-serif" font-size="20">10-currency ACB engine</text>
  <text x="600" y="158" text-anchor="middle" fill="#D7E4FB" font-family="Arial, sans-serif" font-size="20">Performance analytics</text>
  <text x="600" y="184" text-anchor="middle" fill="#D7E4FB" font-family="Arial, sans-serif" font-size="20">Rebalancing advisor</text>

  <rect x="840" y="44" width="320" height="172" rx="14" fill="#1A2E4A"/>
  <text x="1000" y="94" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="28" font-weight="700">Generate Reports</text>
  <text x="1000" y="132" text-anchor="middle" fill="#D7E4FB" font-family="Arial, sans-serif" font-size="20">CRA Tax Report PDF</text>
  <text x="1000" y="158" text-anchor="middle" fill="#D7E4FB" font-family="Arial, sans-serif" font-size="20">Annual Portfolio PDF</text>
  <text x="1000" y="184" text-anchor="middle" fill="#D7E4FB" font-family="Arial, sans-serif" font-size="20">Excel &amp; JSON export</text>

  <path d="M368 130H430" stroke="#2C4D77" stroke-width="8" stroke-linecap="round"/>
  <path d="M430 130L412 115V145L430 130Z" fill="#2C4D77"/>

  <path d="M768 130H830" stroke="#2C4D77" stroke-width="8" stroke-linecap="round"/>
